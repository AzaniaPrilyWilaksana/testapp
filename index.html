<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wife's App 💝</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 20px 20px;
    }

    header h1 {
      font-size: 2.2rem;
      color: #880e4f;
      text-shadow: 1px 1px 3px rgba(255,255,255,0.6);
    }

    header p {
      color: #ad1457;
      font-size: 1rem;
      margin-top: 6px;
    }

    #greeting {
      color: #c2185b;
      font-weight: bold;
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 960px;
      margin: 20px auto 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(136, 14, 79, 0.12);
    }

    .card h2 {
      font-size: 1.1rem;
      color: #880e4f;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* To-Do & Shopping lists */
    .list-input {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .list-input input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #f48fb1;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }

    .list-input input:focus {
      border-color: #e91e63;
    }

    .list-input button, .btn {
      background: #e91e63;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .list-input button:hover, .btn:hover {
      background: #c2185b;
    }

    ul.task-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
    }

    ul.task-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px solid #fce4ec;
      font-size: 0.9rem;
      color: #333;
    }

    ul.task-list li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    ul.task-list li input[type="checkbox"] {
      accent-color: #e91e63;
    }

    ul.task-list li button.del {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #e91e63;
      font-size: 1rem;
      padding: 0 4px;
    }

    /* Notes */
    textarea.note-area {
      width: 100%;
      height: 180px;
      border: 1px solid #f48fb1;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      font-family: inherit;
      color: #333;
    }

    textarea.note-area:focus {
      border-color: #e91e63;
    }

    .note-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      color: #e91e63;
      border: 1px solid #e91e63;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-outline:hover {
      background: #fce4ec;
    }

    /* Reminders */
    .reminder-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px solid #fce4ec;
      font-size: 0.88rem;
      color: #444;
    }

    .reminder-item .time {
      font-size: 0.78rem;
      color: #e91e63;
      white-space: nowrap;
    }

    .reminder-item button.del {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #e91e63;
      font-size: 1rem;
    }

    .reminder-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .reminder-row input[type="text"] {
      flex: 1;
      min-width: 120px;
      padding: 7px 10px;
      border: 1px solid #f48fb1;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
    }

    .reminder-row input[type="datetime-local"] {
      padding: 7px 8px;
      border: 1px solid #f48fb1;
      border-radius: 8px;
      font-size: 0.82rem;
      outline: none;
    }

    .reminders-list {
      max-height: 160px;
      overflow-y: auto;
    }

    /* Mood tracker */
    .moods {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mood-btn {
      font-size: 1.7rem;
      background: none;
      border: 2px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      padding: 4px;
      transition: transform 0.15s, border-color 0.15s;
    }

    .mood-btn:hover, .mood-btn.selected {
      border-color: #e91e63;
      transform: scale(1.2);
    }

    .mood-history {
      font-size: 0.85rem;
      color: #555;
      max-height: 100px;
      overflow-y: auto;
    }

    .mood-history li {
      padding: 3px 0;
      border-bottom: 1px solid #fce4ec;
      display: flex;
      gap: 6px;
    }

    .mood-history li .mtime {
      color: #e91e63;
      font-size: 0.78rem;
    }

    /* Saved note label */
    .saved-label {
      font-size: 0.78rem;
      color: #4caf50;
      margin-top: 4px;
      text-align: right;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.8rem;
      color: #ad1457;
    }
  </style>
</head>
<body>

<header>
  <h1>💝 My Wife's App</h1>
  <p id="greeting">Hello!</p>
</header>

<div class="grid">

  <!-- To-Do List -->
  <div class="card">
    <h2>✅ To-Do List</h2>
    <div class="list-input">
      <input type="text" id="todo-input" placeholder="Add a task…" />
      <button onclick="addTodo()">Add</button>
    </div>
    <ul class="task-list" id="todo-list"></ul>
  </div>

  <!-- Shopping List -->
  <div class="card">
    <h2>🛒 Shopping List</h2>
    <div class="list-input">
      <input type="text" id="shop-input" placeholder="Add an item…" />
      <button onclick="addShop()">Add</button>
    </div>
    <ul class="task-list" id="shop-list"></ul>
  </div>

  <!-- Notes -->
  <div class="card">
    <h2>📝 Notes</h2>
    <textarea class="note-area" id="note-area" placeholder="Write anything here…"></textarea>
    <div class="note-actions">
      <button class="btn-outline" onclick="clearNote()">Clear</button>
      <button class="btn" onclick="saveNote()">Save</button>
    </div>
    <div class="saved-label" id="note-saved"></div>
  </div>

  <!-- Reminders -->
  <div class="card">
    <h2>⏰ Reminders</h2>
    <div class="reminder-row">
      <input type="text" id="rem-text" placeholder="Reminder…" />
      <input type="datetime-local" id="rem-time" />
      <button class="btn" onclick="addReminder()">Add</button>
    </div>
    <div class="reminders-list">
      <ul class="task-list" id="rem-list"></ul>
    </div>
  </div>

  <!-- Mood Tracker -->
  <div class="card">
    <h2>😊 Mood Tracker</h2>
    <div class="moods" id="moods">
      <button class="mood-btn" data-mood="😄" onclick="logMood('😄', this)" title="Happy">😄</button>
      <button class="mood-btn" data-mood="😊" onclick="logMood('😊', this)" title="Good">😊</button>
      <button class="mood-btn" data-mood="😐" onclick="logMood('😐', this)" title="Neutral">😐</button>
      <button class="mood-btn" data-mood="😔" onclick="logMood('😔', this)" title="Sad">😔</button>
      <button class="mood-btn" data-mood="😤" onclick="logMood('😤', this)" title="Frustrated">😤</button>
      <button class="mood-btn" data-mood="🥰" onclick="logMood('🥰', this)" title="Loved">🥰</button>
    </div>
    <ul class="mood-history task-list" id="mood-list"></ul>
  </div>

</div>

<footer>Made with 💗 just for you</footer>

<script>
  // ── Greeting ──────────────────────────────────────────────────────────────
  function updateGreeting() {
    var h = new Date().getHours();
    var msg = h < 12 ? 'Good morning, love! ☀️'
            : h < 18 ? 'Good afternoon, darling! 🌸'
            :           'Good evening, sweetheart! 🌙';
    document.getElementById('greeting').textContent = msg + '  ' + new Date().toLocaleDateString(undefined, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
  updateGreeting();

  // ── Storage helpers ───────────────────────────────────────────────────────
  function load(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  // ── To-Do ─────────────────────────────────────────────────────────────────
  var todos = load('todos', []);

  function renderTodos() {
    var ul = document.getElementById('todo-list');
    ul.innerHTML = '';
    todos.forEach(function(t, i) {
      var li = document.createElement('li');
      if (t.done) li.classList.add('done');
      li.innerHTML = '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTodo(' + i + ')"> '
        + '<span>' + escHtml(t.text) + '</span>'
        + '<button class="del" onclick="deleteTodo(' + i + ')" title="Delete">✕</button>';
      ul.appendChild(li);
    });
  }

  function addTodo() {
    var inp = document.getElementById('todo-input');
    var val = inp.value.trim();
    if (!val) return;
    todos.push({text: val, done: false});
    save('todos', todos);
    inp.value = '';
    renderTodos();
  }

  function toggleTodo(i) {
    todos[i].done = !todos[i].done;
    save('todos', todos);
    renderTodos();
  }

  function deleteTodo(i) {
    todos.splice(i, 1);
    save('todos', todos);
    renderTodos();
  }

  document.getElementById('todo-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTodo();
  });

  renderTodos();

  // ── Shopping ──────────────────────────────────────────────────────────────
  var shops = load('shops', []);

  function renderShops() {
    var ul = document.getElementById('shop-list');
    ul.innerHTML = '';
    shops.forEach(function(t, i) {
      var li = document.createElement('li');
      if (t.done) li.classList.add('done');
      li.innerHTML = '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleShop(' + i + ')"> '
        + '<span>' + escHtml(t.text) + '</span>'
        + '<button class="del" onclick="deleteShop(' + i + ')" title="Delete">✕</button>';
      ul.appendChild(li);
    });
  }

  function addShop() {
    var inp = document.getElementById('shop-input');
    var val = inp.value.trim();
    if (!val) return;
    shops.push({text: val, done: false});
    save('shops', shops);
    inp.value = '';
    renderShops();
  }

  function toggleShop(i) {
    shops[i].done = !shops[i].done;
    save('shops', shops);
    renderShops();
  }

  function deleteShop(i) {
    shops.splice(i, 1);
    save('shops', shops);
    renderShops();
  }

  document.getElementById('shop-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addShop();
  });

  renderShops();

  // ── Notes ─────────────────────────────────────────────────────────────────
  var noteArea = document.getElementById('note-area');
  noteArea.value = load('note', '');

  function saveNote() {
    save('note', noteArea.value);
    var lbl = document.getElementById('note-saved');
    lbl.textContent = 'Saved ✓';
    setTimeout(function() { lbl.textContent = ''; }, 2000);
  }

  function clearNote() {
    noteArea.value = '';
    save('note', '');
    document.getElementById('note-saved').textContent = '';
  }

  // ── Reminders ─────────────────────────────────────────────────────────────
  var reminders = load('reminders', []);

  function renderReminders() {
    var ul = document.getElementById('rem-list');
    ul.innerHTML = '';
    reminders.forEach(function(r, i) {
      var li = document.createElement('li');
      var dt = r.time ? new Date(r.time).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      li.innerHTML = '<span>' + escHtml(r.text) + '</span>'
        + (dt ? '<span class="time">🕐 ' + dt + '</span>' : '')
        + '<button class="del" onclick="deleteReminder(' + i + ')" title="Delete">✕</button>';
      ul.appendChild(li);
    });
  }

  function addReminder() {
    var t = document.getElementById('rem-text').value.trim();
    var dt = document.getElementById('rem-time').value;
    if (!t) return;
    reminders.push({text: t, time: dt});
    save('reminders', reminders);
    document.getElementById('rem-text').value = '';
    document.getElementById('rem-time').value = '';
    renderReminders();
  }

  function deleteReminder(i) {
    reminders.splice(i, 1);
    save('reminders', reminders);
    renderReminders();
  }

  renderReminders();

  // ── Mood Tracker ──────────────────────────────────────────────────────────
  var moods = load('moods', []);

  function renderMoods() {
    var ul = document.getElementById('mood-list');
    ul.innerHTML = '';
    var recent = moods.slice(-8).reverse();
    recent.forEach(function(m) {
      var li = document.createElement('li');
      li.innerHTML = '<span>' + m.mood + '</span>'
        + '<span class="mtime">' + new Date(m.time).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) + '</span>';
      ul.appendChild(li);
    });
  }

  function logMood(emoji, btn) {
    document.querySelectorAll('.mood-btn').forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    moods.push({mood: emoji, time: new Date().toISOString()});
    save('moods', moods);
    renderMoods();
  }

  renderMoods();

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
